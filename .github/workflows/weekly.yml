name: Synthetic Test

on:
  schedule:
    - cron: '0 14 * * 1'  # Mondays at 14:00 UTC
  workflow_dispatch:  # Manual trigger

jobs:
  synthetic-test:
    name: "🤖 Synthetic Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run form ping test
        env:
          FORM_URL: ${{ vars.FORM_URL }}
          NAME_SELECTOR: ${{ vars.NAME_SELECTOR }}
          EMAIL_SELECTOR: ${{ vars.EMAIL_SELECTOR }}
          MESSAGE_SELECTOR: ${{ vars.MESSAGE_SELECTOR }}
          SUBMIT_SELECTOR: ${{ vars.SUBMIT_SELECTOR }}
          SUCCESS_REGEX: ${{ vars.SUCCESS_REGEX }}
        run: yarn synthetic-test

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Weekly Form Ping Failed',
              body: `The weekly form ping test failed.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })